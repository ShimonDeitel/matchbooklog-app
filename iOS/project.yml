name: Matchbook Log
options:
  bundleIdPrefix: com.shimondeitel.matchbooklog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Matchbook Log:
    type: application
    platform: iOS
    sources:
      - path: Matchbook Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.matchbooklog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Matchbook Log/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Matchbook LogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Matchbook LogTests
      - path: Matchbook Log.storekit
    dependencies:
      - target: Matchbook Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.matchbooklog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Matchbook LogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Matchbook LogUITests
    dependencies:
      - target: Matchbook Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.matchbooklog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Matchbook Log:
    build:
      targets:
        Matchbook Log: all
        Matchbook LogTests: [test]
        Matchbook LogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Matchbook Log.storekit
    test:
      config: Debug
      storeKitConfiguration: Matchbook Log.storekit
      targets:
        - Matchbook LogTests
        - Matchbook LogUITests
    archive:
      config: Release
