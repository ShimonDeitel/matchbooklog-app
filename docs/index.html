<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matchbook Log</title>
<style>
  body { margin:0; background:#241F1B; color:#F5F1E8; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card { max-width:560px; padding:48px 32px; text-align:center; }
  h1 { font-size:2.2rem; margin-bottom:0.4rem; color:#2E2A26; }
  p.tagline { font-size:1.1rem; opacity:0.85; margin-bottom:2rem; }
  .accent { color:#2E2A26; }
  .badge { display:inline-block; padding:6px 16px; border:1px solid #2E2A26; border-radius:999px; font-size:0.85rem; margin-bottom:1.5rem; }
  footer { margin-top:2.5rem; font-size:0.8rem; opacity:0.6; }
  a { color:#2E2A26; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #2E2A2655 0%, #2E2A2600 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="card">
    <div class="badge">iOS App</div>
    <h1>Matchbook Log</h1>
    <p class="tagline">Track a matchbook or matchbox label collection.</p>
    <p>Log matchbooks with venue name and city for free. Upgrade to <span class="accent">Matchbook Log Pro</span> for unlimited entries and rarity flag.</p>
    <footer>
      <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>
      Contact: s0533495227@gmail.com
    </footer>
  </div>
</body>
</html>
